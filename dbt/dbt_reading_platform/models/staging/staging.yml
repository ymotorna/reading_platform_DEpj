# add descriptions for cols + sk cols w/ test for them (unique, not_null)

version: 2

models:

  - name: stg_authors
    description: >
      Reference table of authors available on the platform. Each record represents
      a unique author whose books may be listed in the books catalogue.
    columns:
      - name: author_sk
        description: >
          Surrogate key for the author record. Generated by hashing author_id
          using dbt_utils.generate_surrogate_key. Used as the primary key in
          downstream dimension and fact models.
        data_tests:
          - unique
          - not_null

      - name: author_id
        description: Surrogate key for the author (e.g. A0001).

      - name: name
        description: Full display name of the author.

      - name: nationality
        description: Country or region the author identifies with.

      - name: birth_year
        description: Four-digit birth year of the author.

      - name: bio_snippet
        description: Short biographical blurb shown on the author profile page.

  - name: stg_books
    description: >
      Catalogue of all books ever added to the platform. Tracks publication metadata,
      content classification, and current availability status.
    columns:
      - name: book_sk
        description: >
          Surrogate key for the book record. Generated by hashing book_id
          using dbt_utils.generate_surrogate_key. Used as the primary key in
          downstream dimension and fact models.
        data_tests:
          - unique
          - not_null

      - name: book_id
        description: Surrogate key for the book (e.g. B0001).

      - name: author_id
        description: Foreign key referencing stg_authors.author_id.

      - name: title
        description: Full title of the book as displayed on the platform.

      - name: genre
        description: Primary genre classification of the book.

      - name: language
        description: Language in which the book is written.

      - name: published_date
        description: Original publication date of the book (not the platform add date).

      - name: page_count
        description: Total number of pages in the book edition used on the platform.

      - name: added_to_platform_at
        description: Date the book was made available in the platform catalogue.

      - name: is_available
        description: Whether the book is currently accessible to readers (true/false).

  - name: stg_users
    description: >
      Core user registry. Contains profile, demographic, and account-status data
      for every registered user. Soft-deleted users retain their row with deleted_at
      populated and is_active set to false.
    columns:
      - name: user_sk
        description: >
          Surrogate key for the user record. Generated by hashing user_id
          using dbt_utils.generate_surrogate_key. Used as the primary key in
          downstream dimension and fact models.
        data_tests:
          - unique
          - not_null

      - name: user_id
        description: Surrogate key for the user (e.g. U0001).

      - name: email
        description: User's registered email address. Must be unique across the platform.

      - name: username
        description: Public-facing display name chosen by the user.

      - name: country
        description: Two-letter ISO country code of the user's registered location.

      - name: signup_at
        description: Date the user completed account registration.

      - name: birth_year
        description: Four-digit birth year used for age-gating and demographic reporting.

      - name: preferred_genres
        description: >
          Pipe-delimited list of genres the user selected during onboarding
          (e.g. "Fiction|Mystery|Sci-Fi"). May contain one or more values.

      - name: device_type
        description: Primary device the user reads on.

      - name: is_active
        description: >
          False when the account has been soft-deleted or suspended.
          Should be false whenever deleted_at is populated.

      - name: deleted_at
        description: >
          Date the account was soft-deleted. NULL for active accounts.
          When populated, is_active must be false.

  - name: stg_subscriptions
    description: >
      One row per subscription period per user. A user may hold multiple sequential
      or concurrent subscriptions. Tracks plan type, billing terms, and cancellation
      metadata.
    columns:
      - name: subscription_sk
        description: >
          Surrogate key for the subscription record. Generated by hashing subscription_id
          using dbt_utils.generate_surrogate_key. Used as the primary key in
          downstream dimension and fact models.
        data_tests:
          - unique
          - not_null

      - name: subscription_id
        description: Surrogate key for the subscription record (e.g. S00001).

      - name: user_id
        description: Foreign key referencing stg_users.user_id.

      - name: plan_type
        description: Tier of the subscription.

      - name: started_at
        description: Date the subscription period began.

      - name: ended_at
        description: Date the subscription period ended or is scheduled to end.

      - name: price
        description: >
          Fixed monthly price for the plan at time of subscription.
          Expected constant values: free = 0.00, basic = 9.99, premium = 19.99.

      - name: payment_method
        description: >
          Payment method on file for this subscription.
          Empty string for free-tier subscriptions.

      - name: renewal_type
        description: Whether the subscription renews automatically or requires manual action.

      - name: is_active
        description: True if the subscription is currently in effect.

      - name: cancel_reason
        description: >
          Self-reported reason for cancellation. Empty string for active or
          free-tier subscriptions with no cancellation event.

  - name: stg_payments
    description: >
      Transactional log of all payment attempts tied to paid subscriptions.
      One row per billing cycle attempt. Free-tier subscriptions generate no
      payment rows.
    columns:
      - name: payment_sk
        description: >
          Surrogate key for the payment record. Generated by hashing payment_id
          using dbt_utils.generate_surrogate_key. Used as the primary key in
          downstream dimension and fact models.
        data_tests:
          - unique
          - not_null

      - name: payment_id
        description: Surrogate key for the payment record (e.g. P000001).

      - name: subscription_id
        description: Foreign key referencing stg_subscriptions.subscription_id.

      - name: user_id
        description: >
          Foreign key referencing stg_users.user_id. Denormalised from the
          subscription for easier querying of user payment history.

      - name: paid_at
        description: Timestamp of when the payment attempt was processed.

      - name: amount
        description: Charged amount in the transaction currency.

      - name: currency
        description: ISO 4217 currency code for the transaction.

      - name: payment_method
        description: Payment instrument used for this specific transaction.

      - name: status
        description: Outcome of the payment attempt.

      - name: billing_period_start
        description: First day of the billing cycle this payment covers.

      - name: billing_period_end
        description: Last day of the billing cycle this payment covers.

  - name: stg_reading_sessions
    description: >
      Event-level log of individual reading sessions. Each row represents one
      continuous reading session for a single user on a single book. Used for
      engagement analytics and progress tracking.
    columns:
      - name: session_sk
        description: >
          Surrogate key for the reading session record. Generated by hashing session_id
          using dbt_utils.generate_surrogate_key. Used as the primary key in
          downstream fact models.
        data_tests:
          - unique
          - not_null

      - name: session_id
        description: Surrogate key for the reading session (e.g. SS000001).

      - name: user_id
        description: Foreign key referencing stg_users.user_id.

      - name: book_id
        description: Foreign key referencing stg_books.book_id.

      - name: started_at
        description: Timestamp when the reading session began.

      - name: ended_at
        description: Timestamp when the reading session ended.

      - name: pages_read
        description: Number of pages covered during this session.

      - name: device_type
        description: Device used during this specific session.

      - name: completion_pct
        description: >
          Cumulative percentage of the book completed as of the end of this session
          (0.0–100.0). Derived from pages_read relative to total page_count.

  - name: stg_reviews
    description: >
      User-submitted ratings and optional text reviews for books. Limited to one
      review per user–book pair. review_text is nullable — users may submit a
      star rating without written commentary.
    columns:
      - name: review_sk
        description: >
          Surrogate key for the review record. Generated by hashing review_id
          using dbt_utils.generate_surrogate_key. Used as the primary key in
          downstream fact models.
        data_tests:
          - unique
          - not_null

      - name: review_id
        description: Surrogate key for the review record (e.g. R00001).

      - name: user_id
        description: Foreign key referencing stg_users.user_id.

      - name: book_id
        description: Foreign key referencing stg_books.book_id.

      - name: rating
        description: Star rating given by the user, on a scale of 1 (lowest) to 5 (highest).

      - name: review_text
        description: >
          Optional free-text review body written by the user.
          NULL (or empty string) when the user submitted only a star rating.

      - name: created_at
        description: Timestamp when the review was submitted.

      - name: is_verified_reader
        description: >
          True if the platform has confirmed this user completed at least one
          reading session for the reviewed book before submitting the review.