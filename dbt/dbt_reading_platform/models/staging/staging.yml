# add descriptions for cols + sk cols w/ test for them (unique, not_null)
# add data_tests for vals:
  # PK uniqueness
  # not null
  # accepted vals
  # relationships bw  tbls

version: 2

models:
  - name: stg_authors
    description: "Reference table of authors available on the platform."
    columns:
      - name: author_sk
        description: "Surrogate key generated by dbt_utils.generate_surrogate_key."
        data_tests:
          - unique
          - not_null
      - name: author_id
        description: "Primary key from the source system."
        data_tests:
          - unique
          - not_null
      - name: nationality
        data_tests:
          - accepted_values:
              values: ["American","British","French","Japanese","German","Spanish","Brazilian","Canadian","Australian","Italian"]

  - name: stg_books
    description: "Catalogue of all books available on the platform."
    columns:
      - name: book_sk
        data_tests:
          - unique
          - not_null
      - name: book_id
        data_tests:
          - unique
          - not_null
      - name: author_sk
        description: "FK to stg_authors."
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_authors')
              field: author_sk
      - name: genre
        data_tests:
          - accepted_values:
              values: ["Fiction","Mystery","Sci-Fi","Romance","Thriller","Fantasy","Biography","Self-Help","History","Horror"]

  - name: stg_users
    description: "Core user registry including demographic and status data."
    columns:
      - name: user_sk
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - unique
          - not_null
      - name: email
        data_tests:
          - unique
          - not_null
      - name: device_type
        data_tests:
          - accepted_values:
              values: ["mobile","desktop","tablet","e-reader"]

  - name: stg_subscriptions
    description: "Subscription period tracking for users."
    columns:
      - name: subscription_sk
        data_tests:
          - unique
          - not_null
      - name: subscription_id
        data_tests:
          - unique
          - not_null
      - name: user_sk
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_users')
              field: user_sk
      - name: plan_type
        data_tests:
          - accepted_values:
              values: ["free", "basic", "premium"]

  - name: stg_payments
    description: "Transactional log of payment attempts."
    columns:
      - name: payment_sk
        data_tests:
          - unique
          - not_null
      - name: payment_id
        data_tests:
          - unique
          - not_null
      - name: subscription_sk
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_subscriptions')
              field: subscription_sk
      - name: status
        data_tests:
          - accepted_values:
              values: ["success", "failed", "refunded"]

  - name: stg_reading_sessions
    description: "Log of individual user reading sessions."
    columns:
      - name: session_sk
        data_tests:
          - unique
          - not_null
      - name: user_sk
        data_tests:
          - relationships:
              to: ref('stg_users')
              field: user_sk
      - name: book_sk
        data_tests:
          - relationships:
              to: ref('stg_books')
              field: book_sk

  - name: stg_reviews
    description: "User-submitted book reviews and ratings."
    columns:
      - name: review_sk
        data_tests:
          - unique
          - not_null
      - name: rating
        data_tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_genres
    description: "Staging model for the genres seed file."
    columns:
      - name: genre_sk
        data_tests:
          - unique
          - not_null

  - name: stg_languages
    description: "Staging model for the languages seed file."
    columns:
      - name: language_sk
        data_tests:
          - unique
          - not_null

  - name: stg_country_codes
    description: "Staging model for the country codes seed file."
    columns:
      - name: country_sk
        data_tests:
          - unique
          - not_null